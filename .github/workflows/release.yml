name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate plugin
        run: .husky/validate-plugin.sh

      - name: Check for version bump
        id: version
        run: |
          PLUGIN_JSON=".claude-plugin/plugin.json"
          current_version=$(jq -r '.version' "$PLUGIN_JSON")

          # Check if tag already exists — if so, no release needed
          if git rev-parse "v$current_version" >/dev/null 2>&1; then
            echo "Tag v$current_version already exists, skipping release"
            echo "release=false" >> $GITHUB_OUTPUT
          else
            echo "New version detected: $current_version"
            echo "release=true" >> $GITHUB_OUTPUT
            echo "version=$current_version" >> $GITHUB_OUTPUT
          fi

      - name: Verify version sync
        if: steps.version.outputs.release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLUGIN_V=$(jq -r '.version' .claude-plugin/plugin.json)
          MARKET_V=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          PACKAGE_V=$(jq -r '.version' package.json)

          if [ "$PLUGIN_V" != "$VERSION" ] || [ "$MARKET_V" != "$VERSION" ] || [ "$PACKAGE_V" != "$VERSION" ]; then
            echo "::error::Version mismatch: plugin.json=$PLUGIN_V marketplace.json=$MARKET_V package.json=$PACKAGE_V"
            exit 1
          fi

      - name: Create tag and release
        if: steps.version.outputs.release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "v$VERSION"
          git push --tags

          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # Get commit message for release notes
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" HEAD)
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: steps.version.outputs.release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: ${{ env.COMMIT_MSG }}
          generate_release_notes: false
